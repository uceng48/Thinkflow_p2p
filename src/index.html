<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>ThinkFlow – Database P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===== SAME STYLE AS PREVIOUS ===== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 520px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            margin-bottom: 16px;
        }
        h1 { font-size: 1.4rem; font-weight: 700; color: #075E54; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .mode-selector { display: flex; gap: 10px; margin-bottom: 16px; }
        .mode-selector button {
            flex: 1; padding: 10px; border: 2px solid #ddd; border-radius: 12px;
            background: white; font-weight: 600; cursor: pointer; transition: 0.2s; font-family: inherit;
        }
        .mode-selector button.active { border-color: #25D366; background: #e8f5e9; }
        .mode-selector button:active { transform: scale(0.96); }
        .hidden { display: none !important; }
        .peer-section { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        .peer-section input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 30px; font-size: 0.9rem; min-width: 120px; }
        .peer-section button { padding: 10px 18px; background: #25D366; color: white; border: none; border-radius: 30px; font-weight: 600; cursor: pointer; font-family: inherit; white-space: nowrap; }
        .peer-section button:active { transform: scale(0.95); }
        .status { font-size: 0.85rem; color: #555; margin-bottom: 12px; padding: 8px 12px; background: #f8f9fa; border-radius: 12px; }
        .status strong { color: #075E54; }

        .folder-section { background: #f8f9fa; border-radius: 16px; padding: 16px; margin-bottom: 16px; }
        .folder-section button { padding: 10px 20px; background: #128C7E; color: white; border: none; border-radius: 30px; font-weight: 600; cursor: pointer; font-family: inherit; }
        .folder-section button:active { transform: scale(0.95); }
        .folder-path { font-size: 0.8rem; color: #666; margin-top: 6px; word-break: break-all; }
        .index-status { font-size: 0.8rem; color: #075E54; margin-top: 6px; }
        .update-actions { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
        .update-actions button {
            padding: 8px 16px; border: none; border-radius: 30px; font-weight: 600;
            cursor: pointer; font-family: inherit; transition: 0.2s;
        }
        .update-actions button:active { transform: scale(0.95); }
        .btn-reload { background: #128C7E; color: white; }
        .btn-auto { background: #6c757d; color: white; }
        .btn-auto.on { background: #28a745; }
        #update-status { font-size: 0.8rem; color: #666; margin-top: 4px; }

        .db-list { max-height: 300px; overflow-y: auto; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }
        .db-item { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
        .db-item img { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; background: #eee; }
        .db-item .info { flex: 1; }
        .db-item .info .name { font-weight: 700; color: #075E54; }
        .db-item .info .meta { font-size: 0.8rem; color: #555; }

        .scan-buttons { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
        .scan-buttons button {
            flex: 1; min-width: 60px; padding: 10px 6px; border: none; border-radius: 30px;
            font-weight: 600; color: white; cursor: pointer; font-family: inherit; font-size: 0.8rem;
        }
        .scan-buttons button:active { transform: scale(0.95); }
        .btn-qr { background: #3b82f6; }
        .btn-barcode { background: #f59e0b; }
        .btn-ocr { background: #8b5cf6; }
        .btn-img { background: #ef4444; }
        .btn-manual { background: #10b981; }

        .result-box {
            background: #f8f9fa; border-radius: 16px; padding: 16px;
            margin-top: 12px; min-height: 100px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }
        .result-box img { max-width: 100%; max-height: 200px; border-radius: 12px; margin-top: 8px; }
        .result-box .label { font-size: 1.2rem; font-weight: 600; color: #075E54; }
        .result-box .code { font-size: 1.4rem; font-weight: 700; color: #1a1a1a; }
        .result-box .hint { color: #999; font-size: 0.9rem; }
        .result-box .meta { font-size: 0.9rem; color: #333; margin-top: 4px; white-space: pre-wrap; }

        .history { margin-top: 16px; border-top: 1px solid #eee; padding-top: 12px; max-height: 150px; overflow-y: auto; }
        .history div { padding: 4px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.8rem; color: #555; }

        .scanner-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000;
            display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        .scanner-overlay.open { display: flex; }
        .scanner-box {
            background: white; border-radius: 24px; max-width: 500px; width: 100%; overflow: hidden;
        }
        .scanner-box .header {
            padding: 12px 16px; background: #075E54; color: white;
            display: flex; justify-content: space-between; align-items: center;
        }
        .scanner-box .header h3 { font-size: 1rem; }
        .scanner-box .header button {
            background: rgba(255,255,255,0.2); border: none; color: white;
            width: 36px; height: 36px; border-radius: 50%; font-size: 1.2rem; cursor: pointer;
        }
        .scanner-box #scanner-video { width: 100%; aspect-ratio: 1/1; background: #000; }
        .scanner-box .footer { padding: 10px; text-align: center; font-size: 0.8rem; color: #666; }

        #ocr-video, #imgscan-video { width: 100%; aspect-ratio: 1/1; background: #000; object-fit: cover; border-radius: 12px; }
        .ocr-capture-btn, .img-capture-btn {
            display: block; width: 80%; margin: 12px auto; padding: 12px;
            border: none; border-radius: 40px; font-weight: 700; font-size: 1rem; color: white; cursor: pointer;
        }
        .ocr-capture-btn { background: #8b5cf6; }
        .img-capture-btn { background: #ef4444; }
        .ocr-capture-btn:active, .img-capture-btn:active { transform: scale(0.95); }
        .ocr-status, .imgscan-status { text-align: center; padding: 8px; font-size: 0.8rem; color: #666; }

        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #075E54; color: white; padding: 12px 24px; border-radius: 40px;
            font-weight: 500; z-index: 9999; animation: fadeIn 0.3s;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2); max-width: 90%; text-align: center;
        }
        .toast.error { background: #e74c3c; }
        @keyframes fadeIn { from { opacity:0; transform:translateX(-50%) translateY(20px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
    </style>
</head>
<body>

<div class="container" id="app">
    <h1>📁 ThinkFlow – P2P Database</h1>

    <!-- Mode selector (bisa disembunyikan di build) -->
    <div class="mode-selector" id="mode-selector">
        <button id="mode-server" class="active" onclick="setMode('server')">🖥️ Server (PC)</button>
        <button id="mode-client" onclick="setMode('client')">📱 Client (HP)</button>
    </div>

    <div class="peer-section">
        <input type="text" id="peer-id" placeholder="ID Anda" value="">
        <button onclick="connectPeer()">Hubungkan</button>
    </div>
    <div class="status" id="status">⏳ Belum terhubung</div>

    <!-- SERVER VIEW -->
    <div id="server-view">
        <div class="folder-section">
            <button onclick="selectFolder()">📂 Pilih Folder Database</button>
            <div class="folder-path" id="folder-path">Belum ada folder dipilih</div>
            <div class="index-status" id="index-status"></div>
            <div class="update-actions">
                <button class="btn-reload" onclick="reindexFolder()">🔄 Muat Ulang Sekarang</button>
                <button class="btn-auto" id="btn-auto-update" onclick="toggleAutoUpdate()">⏸️ Auto Update: OFF</button>
            </div>
            <div id="update-status"></div>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
            <span style="font-weight:600; color:#075E54;">📂 Data Terindeks</span>
            <span id="db-count" style="font-size:0.8rem; color:#888;">0 item</span>
        </div>
        <div class="db-list" id="db-list"></div>
    </div>

    <!-- CLIENT VIEW -->
    <div id="client-view" class="hidden">
        <div class="scan-buttons">
            <button class="btn-qr" onclick="startScan('qr')">📷 QR</button>
            <button class="btn-barcode" onclick="startScan('barcode')">📷 Barcode</button>
            <button class="btn-ocr" onclick="startScan('ocr')">📷 OCR</button>
            <button class="btn-img" onclick="startScan('img')">🖼️ Gambar</button>
            <button class="btn-manual" onclick="manualInput()">✏️ Manual</button>
        </div>
        <div class="result-box" id="result-box">
            <div class="hint">🔍 Hasil scan akan muncul di sini</div>
        </div>
        <div class="history" id="history-list"></div>
    </div>
</div>

<!-- SCANNER OVERLAY (QR/Barcode) -->
<div class="scanner-overlay" id="scanner-overlay">
    <div class="scanner-box">
        <div class="header"><h3 id="scanner-title">📷 Scan</h3><button onclick="closeScanner()">✕</button></div>
        <div id="scanner-video"></div>
        <div class="footer" id="scanner-footer">Arahkan ke kode</div>
    </div>
</div>

<!-- OCR OVERLAY -->
<div class="scanner-overlay" id="ocr-overlay">
    <div class="scanner-box">
        <div class="header" style="background:#8b5cf6;"><h3>📷 OCR - Ambil Gambar</h3><button onclick="closeOcr()">✕</button></div>
        <video id="ocr-video" autoplay playsinline></video>
        <button class="ocr-capture-btn" onclick="captureOcr()">📸 Ambil & Proses</button>
        <div class="ocr-status" id="ocr-status">Arahkan ke teks, lalu tekan tombol</div>
    </div>
</div>

<!-- IMAGE SCAN OVERLAY -->
<div class="scanner-overlay" id="imgscan-overlay">
    <div class="scanner-box">
        <div class="header" style="background:#ef4444;"><h3>🖼️ Scan Gambar</h3><button onclick="closeImgScan()">✕</button></div>
        <video id="imgscan-video" autoplay playsinline></video>
        <button class="img-capture-btn" onclick="captureImgScan()">📸 Ambil & Cari</button>
        <div class="imgscan-status" id="imgscan-status">Foto akan dicocokkan dengan database</div>
    </div>
</div>

<script>
// ============================================================
//  DETEKSI MODE OTOMATIS
// ============================================================
const urlParams = new URLSearchParams(window.location.search);
let mode = urlParams.get('mode') || 'server'; // default server

// Deteksi environment
const isElectron = navigator.userAgent.includes('Electron');
const isCapacitor = typeof Capacitor !== 'undefined';

if (isElectron) mode = 'server';
else if (isCapacitor) mode = 'client';

// Sembunyikan mode selector di build
if (isElectron || isCapacitor) {
    document.getElementById('mode-selector').style.display = 'none';
}

// ============================================================
//  STATE
// ============================================================
let myId = localStorage.getItem('p2p_id') || 'server-pc';
document.getElementById('peer-id').value = myId;

let peer = null, conn = null;
let peerConnected = false;
let dbIndex = [];
let folderHandle = null;

// ===== UI =====
function setMode(m) {
    mode = m;
    document.querySelectorAll('.mode-selector button').forEach(b => b.classList.remove('active'));
    if (m === 'server') {
        document.getElementById('mode-server').classList.add('active');
        document.getElementById('server-view').classList.remove('hidden');
        document.getElementById('client-view').classList.add('hidden');
    } else {
        document.getElementById('mode-client').classList.add('active');
        document.getElementById('server-view').classList.add('hidden');
        document.getElementById('client-view').classList.remove('hidden');
    }
    renderDB();
}

// ============================================================
//  PEER CONNECTION (sama seperti sebelumnya)
// ============================================================
function connectPeer() {
    const id = document.getElementById('peer-id').value.trim();
    if (!id) return showToast('Masukkan ID');
    if (peer) peer.destroy();
    myId = id;
    localStorage.setItem('p2p_id', myId);
    peer = new Peer(myId, {
        debug: 2,
        config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
    });
    peer.on('open', () => {
        updateStatus('Siap (ID: ' + myId + ')', true);
        showToast('✅ Peer siap');
        if (mode === 'client') {
            const target = prompt('Masukkan ID Server (PC):');
            if (target) {
                const c = peer.connect(target, { reliable: true });
                conn = c;
                setupConnection(c);
            }
        }
    });
    peer.on('connection', (c) => {
        if (conn) conn.close();
        conn = c;
        setupConnection(c);
        showToast('🔗 Client terhubung: ' + c.peer);
    });
    peer.on('error', (err) => {
        console.error(err);
        if (err.type === 'peer-unavailable') showToast('❌ ID tidak ditemukan', 'error');
        else showToast('❌ Error: ' + err.message, 'error');
        updateStatus('Error', false);
    });
    peer.on('disconnected', () => {
        updateStatus('Terputus', false);
        showToast('⚠️ Koneksi terputus', 'error');
    });
}

function setupConnection(c) {
    c.on('open', () => {
        peerConnected = true;
        updateStatus('Terhubung dengan: ' + c.peer, true);
        showToast('✅ Koneksi aktif');
    });
    c.on('data', (data) => handleData(data));
    c.on('close', () => {
        peerConnected = false;
        updateStatus('Koneksi ditutup', false);
        showToast('🔌 Koneksi ditutup', 'error');
    });
    c.on('error', (e) => { console.error(e); showToast('❌ Error koneksi', 'error'); });
}

function sendToPeer(data) {
    if (!conn || !conn.open) {
        showToast('❌ Tidak ada koneksi aktif', 'error');
        return false;
    }
    try { conn.send(data); return true; } catch(e) { showToast('❌ Gagal kirim', 'error'); return false; }
}

function updateStatus(msg, ok) {
    const el = document.getElementById('status');
    el.innerHTML = '🔗 ' + msg;
    el.style.color = ok ? '#075E54' : '#e74c3c';
}

// ============================================================
//  HANDLE DATA
// ============================================================
function handleData(data) {
    console.log('📩 Received:', data);
    if (data.type === 'query_text') {
        if (mode === 'server') {
            const result = searchIndex(data.text);
            sendToPeer({ type: 'result', data: result });
            if (result) showToast('📤 Dikirim: ' + result.name);
            else showToast('❌ Tidak ditemukan', 'error');
        }
    } else if (data.type === 'query_image') {
        if (mode === 'server') {
            processImageQuery(data.image).then(result => {
                sendToPeer({ type: 'result', data: result });
                if (result) showToast('📤 Dikirim: ' + result.name);
                else showToast('❌ Tidak ditemukan', 'error');
            });
        }
    } else if (data.type === 'result') {
        if (mode === 'client') {
            displayResult(data.data);
        }
    }
}

// ============================================================
//  SERVER: INDEKS FOLDER
// ============================================================
async function selectFolder() {
    if (!('showDirectoryPicker' in window)) {
        showToast('❌ Browser tidak mendukung File System Access API. Gunakan Chrome/Edge.', 'error');
        return;
    }
    try {
        folderHandle = await window.showDirectoryPicker();
        document.getElementById('folder-path').textContent = '📂 ' + folderHandle.name + ' (Path: ' + folderHandle.name + ')';
        if (isAutoUpdateOn) toggleAutoUpdate();
        await indexFolder(folderHandle);
        showToast('✅ Folder terindeks: ' + folderHandle.name);
    } catch (e) {
        if (e.name !== 'AbortError') {
            showToast('❌ Gagal memilih folder', 'error');
            console.error(e);
        }
    }
}

async function indexFolder(handle) {
    document.getElementById('index-status').textContent = '⏳ Mengindeks folder...';
    dbIndex = [];
    await walkDir(handle);
    document.getElementById('index-status').textContent = '✅ Terindeks: ' + dbIndex.length + ' item';
    renderDB();
    localStorage.setItem('dbIndexLength', dbIndex.length);
}

async function walkDir(handle, path = '') {
    const entries = [];
    for await (const entry of handle.values()) {
        entries.push(entry);
    }
    const imageFiles = entries.filter(e => e.kind === 'file' && /\.(jpg|jpeg|png|webp)$/i.test(e.name));
    const textFiles = entries.filter(e => e.kind === 'file' && /\.(txt|csv|json)$/i.test(e.name));

    for (const imgFile of imageFiles) {
        const baseName = imgFile.name.replace(/\.[^.]+$/, '');
        const textFile = textFiles.find(t => t.name.replace(/\.[^.]+$/, '') === baseName);
        let textContent = '';
        if (textFile) {
            try {
                const file = await textFile.getFile();
                textContent = await file.text();
            } catch(e) {}
        }
        try {
            const file = await imgFile.getFile();
            const imageData = await readFileAsDataURL(file);
            const hash = await getImageHash(imageData);
            let ocrText = '';
            try {
                const result = await Tesseract.recognize(imageData, 'ind');
                ocrText = result.data.text.trim();
            } catch(e) {}
            dbIndex.push({
                id: Date.now() + '_' + Math.random().toString(36).slice(2,6),
                name: imgFile.name,
                path: path + '/' + imgFile.name,
                imageData: imageData,
                textContent: textContent,
                ocrText: ocrText,
                hash: hash,
                metadata: { textFile: textFile ? textFile.name : null }
            });
        } catch(e) {
            console.error('Gagal baca file:', imgFile.name, e);
        }
    }
    for (const entry of entries) {
        if (entry.kind === 'directory') {
            await walkDir(entry, path + '/' + entry.name);
        }
    }
}

function readFileAsDataURL(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
    });
}

// ===== HASH =====
function getImageHash(dataUrl) {
    return new Promise((resolve) => {
        const img = new Image();
        img.onload = function() {
            const canvas = document.createElement('canvas');
            canvas.width = 8; canvas.height = 8;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, 8, 8);
            const data = ctx.getImageData(0, 0, 8, 8).data;
            let gray = [], total = 0;
            for (let i=0; i<64; i++) {
                const r = data[i*4], g = data[i*4+1], b = data[i*4+2];
                const val = 0.299*r + 0.587*g + 0.114*b;
                gray.push(val); total += val;
            }
            const avg = total / 64;
            let hash = '';
            for (let i=0; i<64; i++) hash += (gray[i] >= avg) ? '1' : '0';
            resolve(hash);
        };
        img.onerror = () => resolve(null);
        img.src = dataUrl;
    });
}

function hammingDistance(a, b) {
    if (!a || !b || a.length !== b.length) return 999;
    let d = 0;
    for (let i=0; i<a.length; i++) if (a[i] !== b[i]) d++;
    return d;
}

// ============================================================
//  PENCARIAN
// ============================================================
function searchIndex(query) {
    if (!query) return null;
    const q = query.trim().toLowerCase();
    if (!q) return null;
    let best = null;
    let bestScore = 0;
    for (const item of dbIndex) {
        let score = 0;
        if (item.name.toLowerCase().includes(q)) score += 10;
        if (item.textContent.toLowerCase().includes(q)) score += 8;
        if (item.ocrText && item.ocrText.toLowerCase().includes(q)) score += 6;
        const words = q.split(/\s+/);
        for (const w of words) {
            if (w.length > 2) {
                if (item.name.toLowerCase().includes(w)) score += 3;
                if (item.textContent.toLowerCase().includes(w)) score += 2;
                if (item.ocrText && item.ocrText.toLowerCase().includes(w)) score += 1;
            }
        }
        if (score > bestScore) {
            bestScore = score;
            best = item;
        }
    }
    if (best && bestScore >= 3) return best;
    return null;
}

async function processImageQuery(imageDataUrl) {
    const queryHash = await getImageHash(imageDataUrl);
    if (!queryHash) return null;
    let bestMatch = null;
    let bestDist = 999;
    for (const item of dbIndex) {
        if (item.hash) {
            const dist = hammingDistance(queryHash, item.hash);
            if (dist < bestDist) {
                bestDist = dist;
                bestMatch = item;
            }
        }
    }
    if (bestMatch && bestDist <= 12) {
        return bestMatch;
    }
    try {
        const result = await Tesseract.recognize(imageDataUrl, 'ind');
        const text = result.data.text.trim();
        if (text) return searchIndex(text);
    } catch(e) {}
    return null;
}

// ============================================================
//  RENDER DB
// ============================================================
function renderDB() {
    const list = document.getElementById('db-list');
    const count = document.getElementById('db-count');
    count.textContent = dbIndex.length + ' item';
    if (dbIndex.length === 0) {
        list.innerHTML = '<div style="color:#999; padding:12px; text-align:center;">Belum ada data terindeks</div>';
        return;
    }
    let html = '';
    dbIndex.slice(0, 20).forEach(item => {
        html += `
            <div class="db-item">
                <img src="${item.imageData}" onerror="this.style.display='none'">
                <div class="info">
                    <div class="name">${item.name}</div>
                    <div class="meta">${item.textContent ? item.textContent.slice(0, 60) : 'Tidak ada teks'}</div>
                </div>
            </div>
        `;
    });
    list.innerHTML = html;
}

// ============================================================
//  AUTO UPDATE FOLDER
// ============================================================
let autoUpdateInterval = null;
let isAutoUpdateOn = false;

async function reindexFolder() {
    if (!folderHandle) {
        showToast('⚠️ Pilih folder terlebih dahulu!', 'error');
        return;
    }
    document.getElementById('update-status').textContent = '⏳ Memuat ulang indeks...';
    await indexFolder(folderHandle);
    document.getElementById('update-status').textContent = '✅ Terakhir diperbarui: ' + new Date().toLocaleTimeString();
    showToast('🔄 Database diperbarui (' + dbIndex.length + ' item)');
}

function toggleAutoUpdate() {
    const btn = document.getElementById('btn-auto-update');
    if (isAutoUpdateOn) {
        clearInterval(autoUpdateInterval);
        autoUpdateInterval = null;
        isAutoUpdateOn = false;
        btn.textContent = '▶️ Auto Update: OFF';
        btn.className = 'btn-auto';
        document.getElementById('update-status').textContent = 'Auto Update dimatikan';
    } else {
        if (!folderHandle) {
            showToast('⚠️ Pilih folder dulu!', 'error');
            return;
        }
        isAutoUpdateOn = true;
        btn.textContent = '⏸️ Auto Update: ON (10s)';
        btn.className = 'btn-auto on';
        document.getElementById('update-status').textContent = '⏳ Auto Update aktif (setiap 10 detik)';
        reindexFolder();
        autoUpdateInterval = setInterval(() => {
            reindexFolder();
        }, 10000);
    }
}

// ============================================================
//  CLIENT FUNCTIONS
// ============================================================
function sendTextQuery(text) {
    if (!conn || !conn.open) {
        showToast('❌ Belum terhubung ke server', 'error');
        return;
    }
    sendToPeer({ type: 'query_text', text: text });
    addHistory('🔍 Query: ' + text);
    document.getElementById('result-box').innerHTML = `<div class="hint">⏳ Mencari...</div>`;
}

function sendImageQuery(imageData) {
    if (!conn || !conn.open) {
        showToast('❌ Belum terhubung ke server', 'error');
        return;
    }
    sendToPeer({ type: 'query_image', image: imageData });
    addHistory('🖼️ Query gambar');
    document.getElementById('result-box').innerHTML = `<div class="hint">⏳ Mencocokkan gambar...</div>`;
}

function displayResult(data) {
    const box = document.getElementById('result-box');
    if (!data) {
        box.innerHTML = `<div class="hint">❌ Tidak ditemukan</div>`;
        addHistory('❌ Tidak ditemukan');
        return;
    }
    let html = `
        <div class="code">${data.name}</div>
        <div class="label">📄 ${data.textContent ? data.textContent : 'Tidak ada teks'}</div>
        <img src="${data.imageData}" alt="${data.name}">
    `;
    box.innerHTML = html;
    addHistory('✅ Ditemukan: ' + data.name);
}

function addHistory(text) {
    const el = document.getElementById('history-list');
    const div = document.createElement('div');
    div.textContent = text;
    el.prepend(div);
    if (el.children.length > 20) el.removeChild(el.lastChild);
}

// ============================================================
//  SCAN: QR / BARCODE / OCR / IMAGE
// ============================================================
let html5Qr = null;
let scanType = 'qr';

function startScan(type) {
    if (type === 'ocr') {
        openOcr();
        return;
    }
    if (type === 'img') {
        openImgScan();
        return;
    }
    scanType = type;
    const overlay = document.getElementById('scanner-overlay');
    document.getElementById('scanner-title').textContent = type === 'qr' ? '📷 Scan QR' : '📷 Scan Barcode';
    document.getElementById('scanner-footer').textContent = 'Arahkan ke kode';
    overlay.classList.add('open');

    const videoEl = document.getElementById('scanner-video');
    videoEl.innerHTML = '';
    html5Qr = new Html5Qrcode("scanner-video");
    html5Qr.start(
        { facingMode: "environment" },
        { fps: 15, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 },
        (decodedText) => {
            closeScanner();
            sendTextQuery(decodedText);
            showToast('✅ Scan: ' + decodedText);
        },
        () => {}
    ).catch(err => {
        console.error(err);
        showToast('❌ Gagal akses kamera', 'error');
        closeScanner();
    });
}

function closeScanner() {
    if (html5Qr) {
        try { html5Qr.stop().then(() => { html5Qr.clear(); html5Qr = null; }).catch(()=>{}); } catch(e) {}
    }
    document.getElementById('scanner-overlay').classList.remove('open');
    document.getElementById('scanner-video').innerHTML = '';
}

// OCR
let ocrStream = null;
function openOcr() {
    document.getElementById('ocr-overlay').classList.add('open');
    navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 640 } },
        audio: false
    }).then(stream => {
        ocrStream = stream;
        const video = document.getElementById('ocr-video');
        video.srcObject = stream;
        return video.play();
    }).then(() => {
        document.getElementById('ocr-status').textContent = '📸 Arahkan ke teks, lalu tekan tombol';
    }).catch(err => {
        showToast('❌ Gagal akses kamera', 'error');
        closeOcr();
    });
}

function closeOcr() {
    if (ocrStream) { ocrStream.getTracks().forEach(t => t.stop()); ocrStream = null; }
    document.getElementById('ocr-overlay').classList.remove('open');
    document.getElementById('ocr-video').srcObject = null;
    document.getElementById('ocr-status').textContent = 'Arahkan ke teks, lalu tekan tombol';
}

async function captureOcr() {
    const video = document.getElementById('ocr-video');
    if (!video.videoWidth || !video.videoHeight) {
        showToast('❌ Kamera belum siap', 'error');
        return;
    }
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const imageDataUrl = canvas.toDataURL('image/jpeg', 0.9);

    document.getElementById('ocr-status').textContent = '⏳ OCR...';
    try {
        const result = await Tesseract.recognize(imageDataUrl, 'ind', {
            logger: (m) => {
                if (m.status === 'recognizing text')
                    document.getElementById('ocr-status').textContent = `⏳ ${Math.round(m.progress * 100)}%`;
            }
        });
        const text = result.data.text.trim();
        closeOcr();
        if (text) {
            sendTextQuery(text);
            showToast('📝 OCR: ' + text);
        } else {
            showToast('⚠️ Tidak ada teks terdeteksi', 'error');
        }
    } catch(e) {
        console.error(e);
        document.getElementById('ocr-status').textContent = '❌ Gagal OCR';
        showToast('❌ Gagal OCR', 'error');
    }
}

// IMAGE SCAN
let imgStream = null;
function openImgScan() {
    document.getElementById('imgscan-overlay').classList.add('open');
    navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 640 } },
        audio: false
    }).then(stream => {
        imgStream = stream;
        const video = document.getElementById('imgscan-video');
        video.srcObject = stream;
        return video.play();
    }).then(() => {
        document.getElementById('imgscan-status').textContent = '📸 Ambil gambar untuk dicocokkan';
    }).catch(err => {
        showToast('❌ Gagal akses kamera', 'error');
        closeImgScan();
    });
}

function closeImgScan() {
    if (imgStream) { imgStream.getTracks().forEach(t => t.stop()); imgStream = null; }
    document.getElementById('imgscan-overlay').classList.remove('open');
    document.getElementById('imgscan-video').srcObject = null;
    document.getElementById('imgscan-status').textContent = 'Foto akan dicocokkan dengan database';
}

async function captureImgScan() {
    const video = document.getElementById('imgscan-video');
    if (!video.videoWidth || !video.videoHeight) {
        showToast('❌ Kamera belum siap', 'error');
        return;
    }
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const imageDataUrl = canvas.toDataURL('image/jpeg', 0.9);
    document.getElementById('imgscan-status').textContent = '⏳ Mencocokkan...';
    closeImgScan();
    sendImageQuery(imageDataUrl);
}

// ============================================================
//  MANUAL INPUT
// ============================================================
function manualInput() {
    const input = prompt('Masukkan kode / nama / angka:');
    if (input && input.trim()) {
        sendTextQuery(input.trim());
    }
}

// ============================================================
//  TOAST
// ============================================================
function showToast(msg, type) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const t = document.createElement('div');
    t.className = 'toast' + (type === 'error' ? ' error' : '');
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}
