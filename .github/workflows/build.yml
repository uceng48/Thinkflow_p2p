name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Install Android SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk wget unzip
          mkdir -p android-sdk
          cd android-sdk
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip commandlinetools-linux-9477386_latest.zip
          # Struktur: setelah unzip ada folder cmdline-tools
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          rmdir cmdline-tools 2>/dev/null || true
          export ANDROID_HOME=$PWD
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"
          # Set environment for next steps
          echo "ANDROID_HOME=$PWD" >> $GITHUB_ENV
          echo "$PWD/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$PWD/platform-tools" >> $GITHUB_PATH

      - name: Build Capacitor Android
        run: |
          npx cap add android
          npx cap copy android
          npx cap sync android

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: thinkflow-app
          path: android/app/build/outputs/apk/debug/app-debug.apk
