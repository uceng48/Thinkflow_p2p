name: Build Client (Android)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install Capacitor
        run: |
          cd capacitor
          npm install
          npx cap add android
      - name: Build Android APK
        run: |
          cd capacitor
          npx cap sync
          npx cap open android
          cd android
          ./gradlew assembleDebug
      - name: Upload Client APK
        uses: actions/upload-artifact@v4  # ✅ Perbaikan utama: v3 → v4
        with:
          name: client-apk
          path: capacitor/android/app/build/outputs/apk/debug/*.apk
